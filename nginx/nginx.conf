# Dev: nginx at :80 proxies to Vite (frontend:5173) and API (api:8000).
# HMR WebSocket is proxied so you can use http://localhost with hot reload.
#
# Docker DNS (127.0.0.11) + variables: hostnames resolve at request time, not when
# nginx loads config. Static "upstream { server api:8000 }" fails with
# "host not found in upstream" if api is not in DNS yet (race with depends_on).

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name localhost;

    location /api/ {
        set $api_host api;
        # No URI suffix: variable proxy_pass does not apply location rewrite; pass /api/... as-is.
        proxy_pass http://$api_host:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend: proxy to Vite dev server (HTTP + WebSocket for HMR)
    location / {
        set $frontend_host frontend;
        proxy_pass http://$frontend_host:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
