# Included in /etc/nginx/conf.d/default.conf by docker-compose.
# /api -> FastAPI backend; / -> frontend (static SPA, try_files when added).
upstream api {
    server api:8000;
}

server {
    listen 80;
    server_name localhost;

    location /api/ {
        proxy_pass http://api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend: later add root + try_files $uri $uri/ /index.html;
    location / {
        return 404;
    }
}
