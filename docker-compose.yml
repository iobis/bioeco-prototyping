# Run from repo root: docker compose up
# Single entrypoint via nginx on port 80; API and Elasticsearch on internal network.
# Production: set ELASTICSEARCH_URL to your ES if not using the compose elasticsearch.

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bioeco-api
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-FYiriTb4zH=+r0EJ877A}
      - DATA_DIR=/app/data
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - bioeco

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-FYiriTb4zH=+r0EJ877A}
      - xpack.security.http.ssl.enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-FYiriTb4zH=+r0EJ877A} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - bioeco

  nginx:
    image: nginx:alpine
    container_name: bioeco-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - bioeco

networks:
  bioeco:
    driver: bridge
