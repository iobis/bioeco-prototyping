# Run from repo root: docker compose up
# Dev setup: frontend runs in Docker with Vite dev server and autoreload (HMR).
# Edit app/src (and other mounted files); changes are picked up automatically.
# Open http://localhost (nginx) or http://localhost:5173 (Vite directly). Add a separate prod compose later if needed.

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bioeco-api
    ports:
      - "8000:8000"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-FYiriTb4zH=+r0EJ877A}
      - DATA_DIR=/app/data
      - CORS_ORIGINS=http://localhost,http://localhost:3000,http://localhost:5173
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - bioeco

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: elasticsearch
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-FYiriTb4zH=+r0EJ877A}
      - xpack.security.http.ssl.enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-FYiriTb4zH=+r0EJ877A} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - bioeco

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: bioeco-frontend
    working_dir: /app
    volumes:
      # Mount source and config for autoreload; node_modules stay from image
      - ./app/src:/app/src
      - ./app/index.html:/app/index.html
      - ./app/vite.config.ts:/app/vite.config.ts
      - ./app/package.json:/app/package.json
      - ./app/tsconfig.json:/app/tsconfig.json
      - ./app/tsconfig.node.json:/app/tsconfig.node.json
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://api:8000
      - HMR_CLIENT_PORT=80
      # File watching in Docker (required for autoreload)
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - WATCHPACK_POLLING=true
    depends_on:
      - api
    networks:
      - bioeco

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: bioeco-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - api
    networks:
      - bioeco

networks:
  bioeco:
    driver: bridge

volumes:
  elasticsearch-data:
