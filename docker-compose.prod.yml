version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bioeco-api-prod
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - DATA_DIR=/app/data
      - CORS_ORIGINS=http://localhost
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - bioeco

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: elasticsearch-prod
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.http.ssl.enabled=false
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - bioeco

  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile.prod
    container_name: bioeco-frontend-prod
    ports:
      - "8070:80"
    depends_on:
      - api
    networks:
      - bioeco

networks:
  bioeco:
    driver: bridge

volumes:
  elasticsearch-data:

